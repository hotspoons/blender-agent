apiVersion: v1
kind: Service
metadata:
  name: {{ include "blender-mcp.fullname" . }}
  labels:
    {{- include "blender-mcp.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "blender-mcp.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
    {{- if .Values.agent.mcpHttp.enabled }}
    - name: mcp-http
      port: {{ .Values.service.mcpPort }}
      targetPort: mcp-http
      protocol: TCP
    {{- end }}
