{{- if include "blender-mcp.createSecret" . }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "blender-mcp.secretName" . }}
  labels:
    {{- include "blender-mcp.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- if and .Values.agent.llm.apiKey (not .Values.agent.llm.existingSecret) }}
  {{ .Values.agent.llm.existingSecretKey }}: {{ .Values.agent.llm.apiKey | quote }}
  {{- end }}
  {{- if and .Values.agent.chatApiKey.value (not .Values.agent.chatApiKey.existingSecret) }}
  {{ .Values.agent.chatApiKey.existingSecretKey }}: {{ .Values.agent.chatApiKey.value | quote }}
  {{- end }}
{{- end }}
